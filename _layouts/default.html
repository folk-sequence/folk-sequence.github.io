<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Lexend+Deca:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="{% if page.layout == 'essay' %}article{% else %}website{% endif %}">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="{{ '/' | relative_url }}" class="site-title">Folk Sequence</a>
      <nav class="site-nav">
        <a href="{{ site.youtube }}" target="_blank" rel="noopener">YouTube</a>
        <a href="{{ site.jalopy }}" target="_blank" rel="noopener">jalopy.music</a>
      </nav>
    </header>
    <main class="site-main">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p class="mono">folk sequence · daily bitwig sessions · essays by brian m edwards</p>
    </footer>
  </div>
</body>
</html>
